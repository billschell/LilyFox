; LilyFox - morse code fox-hunt beacon for LilyGO T-TWR Plus V2.0
;
; Board/platform settings mirror the known-working ESP32APRS_T-TWR project
; for this hardware (ESP32-S3-WROOM-1 N16R8, octal PSRAM).

[env:esp32s3-twrplus]
; 54.03.21-2 carries Arduino core 3.2.1, which fixes an uninitialized
; RMT config struct in 3.2.0 that made NeoPixel init fail randomly
; ("rmt: not able to power down in light sleep" on GPIO 42 at boot).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21-2/platform-espressif32.zip
board = esp32s3box
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.mcu = esp32s3
board_build.arduino.memory_type = dio_opi
framework = arduino
monitor_speed = 115200
; Do not touch DTR/RTS when opening the monitor: on the ESP32-S3's native
; USB port, asserting them resets the chip into the ROM bootloader.
monitor_dtr = 0
monitor_rts = 0
upload_protocol = esptool
monitor_filters = esp32_exception_decoder
lib_deps =
	lewisxhe/XPowersLib@^0.1.7
	adafruit/Adafruit NeoPixel@^1.11.0
	adafruit/Adafruit SH110X@^2.1.10
build_flags =
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
